[tox]
requires = tox-uv
envlist = lint,mypy,py{310,311,312,313,314},docs

[testenv]
runner = uv-venv-lock-runner
dependency_groups = tests
commands = pytest {posargs}

[testenv:lint]
dependency_groups = lint
skip_install = true
commands = pre-commit run --all-files

[testenv:mypy]
dependency_groups = mypy
commands = mypy --show-error-codes

[testenv:docs]
dependency_groups = docs
commands = sphinx-build --fresh-env docs/ docs/_build {posargs}

; Below tasks are for development only (not run in CI)

[testenv:docs-serve]
runner = uv-venv-runner
deps = sphinx-autobuild
dependency_groups = docs
commands = sphinx-autobuild --port=0 --open-browser --delay=2 docs/ docs/_build {posargs} --watch src --watch README.rst

[testenv:readme-serve]
runner = uv-venv-runner
deps = restview
skip_install = true
commands = restview README.rst

[testenv:benchmark]
runner = uv-venv-runner
usedevelop = true
commands = python performance/benchmark.py --iterations=100 --repeat=3
